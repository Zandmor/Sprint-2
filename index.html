<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body onload="onInit()" oncontextmenu="return false" id="body">
    <header class="main-layout">
        <h1>MAKE YOUR MEME</h1>

    </header>
    <main class="main-layout">
        <div class="sidebar emojisBar"></div>
        <div class="canvas-container">
            <canvas></canvas>
        </div>
        <div class="sidebar textBar"></div>
        <section class="img-row">
            <div class="img-gallery">
            <button class="arrow scroll-back" onclick="onScroll(-1)"></button>
            <img class="img-option" id="img-1" onclick="onSelectImg(this)" src="imgs/1.jpg">
            <img class="img-option" id="img-2" onclick="onSelectImg(this)" src="imgs/2.jpg">
            <img class="img-option" id="img-3" onclick="onSelectImg(this)" src="imgs/3.jpg">
            <button class="arrow scroll-forward" onclick="onScroll(1)"></button>

            </div>
        </section>
            <div class="img-selectors">
                <button class="random rainbow" onclick="onRandom()">RANDOM!!!</button>
                <button class="apply" onclick="onApply()">Apply</button>
                <button class="chooseImg" onclick="onChooseImage()">Choose Image</button>
                <input id="uploadImage" type="file" accept="image/*">
                            </div>
        <div class="tags">

<input id="searchTag" class="searchTag" type="text" placeholder="search by tag">
<button class="tag" onclick="onFunny()">funny</button>
<button class="tag" onclick="onCrying()">crying</button>
<button class="tag" onclick="onAnimal()">animal</button>
<button class="tag" onclick="onLaughing()">laughing</button>
        </div>

        <footer></footer>



    </main>

<script src="js/memeService.js"></script>
<script src="js/main.js"></script>
</body>

</html>
